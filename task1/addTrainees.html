<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Trainee</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0; /* Changed from 40px to 0 for proper centering */
            background-color: #f4f6f9;
            /* Flexbox to center everything */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh; /* Takes full height of the screen */
        }

        h1 {
            color: #333;
            text-align: center; /* Centers the text inside the H1 */
            margin-bottom: 20px;
        }

        /* Container for the form and the back link */
        .form-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        form {
            background: #fff;
            padding: 30px; /* Increased padding for better look */
            width: 350px;
            border-radius: 8px; /* Slightly more rounded */
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); /* Adds depth */
        }

        label {
            font-weight: 500;
            display: block; /* Ensures label stays above input */
            margin-bottom: 5px;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 3px;
            box-sizing: border-box; /* Crucial: keeps width at 100% including padding */
        }

        button {
            width: 100%; /* Makes button span the full width of the form */
            padding: 10px;
            border: none;
            background-color: #007bff;
            color: white;
            cursor: pointer;
            border-radius: 3px;
            font-size: 16px;
        }

        button:hover {
            background-color: #0056b3;
        }

        .back-link {
            margin-top: 20px;
            text-decoration: none;
            color: #007bff;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h1>Add New Trainee</h1>

        <form action="/addTrainees" method="POST">
            <label>Name:</label>
            <input type="text" name="name" required>

            <label>Email:</label>
            <input type="email" name="email" required>

            <label>Phone:</label>
            <input type="text" name="phone" required>

            <label>Gender:</label>
            <select name="gender" required>
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>

            <label>Education:</label>
            <input type="text" name="education" required>

            <label>Address:</label>
            <input type="text" name="address" required>

            <label>Mentor Name:</label>
            <input type="text" name="mentor_name" required>
            
            <button type="submit">Add Trainee</button>
        </form>

        <a href="/getUser" class="back-link">Back to Listing</a>
    </div>

</body>
</html>
